<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Miles — a running log</title>
<style>
  :root {
    --bg: #faf9f7;
    --ink: #1a1a1a;
    --muted: #8a8a82;
    --line: #e7e5e0;
    --accent: #1a1a1a;
    --bar: #d9d6ce;
    --bar-active: #1a1a1a;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
    padding: clamp(24px, 6vw, 80px) clamp(20px, 6vw, 80px);
    max-width: 1040px;
    margin: 0 auto;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 8px 0 4px;
  }
  .sub { color: var(--muted); font-size: 15px; }

  /* hero number */
  .hero {
    margin: clamp(36px, 7vw, 64px) 0 clamp(28px, 5vw, 48px);
  }
  .hero .label {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .hero .number {
    font-size: clamp(56px, 14vw, 132px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 0.95;
    font-variant-numeric: tabular-nums;
  }
  .hero .unit {
    font-size: clamp(20px, 4vw, 32px);
    color: var(--muted);
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .hero .meta {
    margin-top: 14px;
    color: var(--muted);
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .hero .meta b { color: var(--ink); font-weight: 600; }

  /* year toggles */
  .years {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .chip {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-variant-numeric: tabular-nums;
  }
  .chip:hover { border-color: #c9c6bf; color: var(--ink); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* chart */
  .chart-wrap { margin-bottom: 8px; }
  .chart {
    display: flex;
    align-items: flex-end;
    gap: clamp(6px, 2vw, 18px);
    height: 240px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 0;
  }
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    cursor: pointer;
    min-width: 0;
  }
  .bar {
    width: 100%;
    max-width: 72px;
    background: var(--bar);
    border-radius: 6px 6px 0 0;
    transition: height 0.5s cubic-bezier(.22,1,.36,1), background 0.25s, opacity 0.25s;
    opacity: 0.55;
    position: relative;
  }
  .col:hover .bar { opacity: 0.8; }
  .col.active .bar { background: var(--bar-active); opacity: 1; }
  .bar .val {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .col.active .bar .val, .col:hover .bar .val { opacity: 1; }
  .xlabels {
    display: flex;
    gap: clamp(6px, 2vw, 18px);
    margin-top: 10px;
  }
  .xlabels .x {
    flex: 1;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    min-width: 0;
  }
  .xlabels .x.active { color: var(--ink); font-weight: 600; }

  /* conversions */
  .convert {
    margin-top: clamp(40px, 7vw, 64px);
  }
  .convert h2 {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 18px;
  }
  .headline {
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 28px;
  }
  .headline b { font-weight: 600; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .ccard {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .ccard .big {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .ccard .desc { color: var(--muted); font-size: 14px; margin-top: 4px; }

  footer {
    margin-top: clamp(48px, 8vw, 80px);
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
  footer .stamp { display:block; margin-top: 6px; opacity: 0.8; }
  @media (max-width: 480px) {
    .bar .val { font-size: 10px; top: -18px; }
    .xlabels .x { font-size: 11px; }
  }
</style>
</head>
<body>
  <div class="eyebrow">A running log</div>
  <h1>Every mile, since 2018.</h1>
  <p class="sub">Toggle a year to see how far it really went.</p>

  <div class="hero">
    <div class="label" id="hero-label">Lifetime</div>
    <div>
      <span class="number" id="hero-number">0</span>
      <span class="unit">miles</span>
    </div>
    <div class="meta" id="hero-meta"></div>
  </div>

  <div class="years" id="years"></div>

  <div class="chart-wrap">
    <div class="chart" id="chart"></div>
    <div class="xlabels" id="xlabels"></div>
  </div>

  <div class="convert">
    <h2>What that distance looks like</h2>
    <div class="headline" id="headline"></div>
    <div class="cards" id="cards"></div>
  </div>

  <footer>
    Pulled from <span id="run-count">—</span> logged runs · first run <span id="first-run">—</span>.
    <span class="stamp">Last refreshed <span id="updated">—</span> · updates daily from training log.</span>
  </footer>

<script>
// ===== AUTO-GENERATED DATA — do not edit by hand =========================
// This block is rewritten on every build by scripts/build_tracker.py.
/* __DATA__ */
// =========================================================================

const LIFETIME = {
  miles: DATA.reduce((s, d) => s + d.miles, 0),
  runs:  DATA.reduce((s, d) => s + d.runs, 0),
};

// ---- distance reference points (one-way miles) --------------------------
const JOURNEYS = [
  { from: "Land's End", to: "John o' Groats (end to end of Britain)", short: "the length of Britain", miles: 874 },
  { from: "San Francisco", to: "Seattle", short: "San Francisco to Seattle", miles: 808 },
  { from: "London", to: "Rome", short: "London to Rome", miles: 890 },
  { from: "New York", to: "Chicago", short: "New York to Chicago", miles: 790 },
  { from: "Paris", to: "Berlin", short: "Paris to Berlin", miles: 545 },
  { from: "the start", to: "the end of the Appalachian Trail", short: "the Appalachian Trail", miles: 2190 },
  { from: "the start", to: "the end of the Pacific Crest Trail", short: "the Pacific Crest Trail", miles: 2650 },
  { from: "New York", to: "Miami", short: "New York to Miami", miles: 1280 },
  { from: "Los Angeles", to: "New York", short: "coast to coast across the U.S.", miles: 2790 },
  { from: "Tokyo", to: "the tip of Japan", short: "the length of Japan", miles: 1860 },
];
const GLOBE = [
  { name: "Earth's circumference", miles: 24901 },
  { name: "the Moon's circumference", miles: 6786 },
];

const fmt = n => Math.round(n).toLocaleString();
const fmt1 = n => n.toLocaleString(undefined, { maximumFractionDigits: 1 });

function headlineFor(miles) {
  const half = miles / 2;
  let best = null;
  for (const j of JOURNEYS) {
    const ratio = half / j.miles;
    if (ratio >= 0.85 && ratio <= 1.18) {
      const err = Math.abs(1 - ratio);
      if (!best || err < best.err) best = { j, err, type: "roundtrip" };
    }
  }
  if (best) {
    return `That's running <b>${best.j.from} to ${best.j.to.replace(/\s*\(.*\)/,'')}</b> — and most of the way back.`;
  }
  let pick = null;
  for (const j of JOURNEYS) {
    const mult = miles / j.miles;
    if (mult >= 0.9 && mult <= 4.5) {
      const err = Math.abs(mult - Math.round(mult));
      if (!pick || err < pick.err) pick = { j, mult, err };
    }
  }
  if (pick) {
    const m = pick.mult;
    if (m >= 0.9 && m <= 1.15)
      return `That's running <b>${pick.j.short}</b> — the whole way.`;
    return `That's running <b>${pick.j.short}</b> <b>${m.toFixed(1)}×</b> over.`;
  }
  const pct = (miles / GLOBE[0].miles) * 100;
  return `That's <b>${pct.toFixed(0)}%</b> of the way around the planet.`;
}

function cardsFor(miles) {
  const marathons = miles / 26.2;
  const earthPct = (miles / GLOBE[0].miles) * 100;
  let trip = JOURNEYS[0], bestErr = Infinity;
  for (const j of JOURNEYS) {
    const back = miles / (j.miles * 2);
    if (back >= 0.5 && back <= 6) {
      const err = Math.abs(back - Math.round(back));
      if (err < bestErr) { bestErr = err; trip = j; }
    }
  }
  const roundTrips = miles / (trip.miles * 2);
  return [
    { big: fmt(marathons), desc: "marathons, back to back" },
    { big: roundTrips >= 1 ? roundTrips.toFixed(1) + "×" : (miles/trip.miles).toFixed(1)+"×",
      desc: roundTrips >= 1
        ? `${trip.from} to ${trip.to.replace(/\s*\(.*\)/,'')} and back`
        : `the length of ${trip.short}` },
    { big: earthPct >= 100 ? (miles/GLOBE[0].miles).toFixed(2)+"×" : earthPct.toFixed(0) + "%",
      desc: earthPct >= 100 ? "around the Earth" : "of the way around the Earth" },
  ];
}

// ---- render -------------------------------------------------------------
const maxMiles = Math.max(...DATA.map(d => d.miles));
let selected = "lifetime";

const elYears   = document.getElementById("years");
const elChart   = document.getElementById("chart");
const elX       = document.getElementById("xlabels");
const elHeadline= document.getElementById("headline");
const elCards   = document.getElementById("cards");

document.getElementById("run-count").textContent = fmt(LIFETIME.runs);
document.getElementById("first-run").textContent = FIRST_RUN;
document.getElementById("updated").textContent = LAST_UPDATED;

function buildChips() {
  elYears.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (selected === "lifetime" ? " active" : "");
  all.textContent = "Lifetime";
  all.onclick = () => select("lifetime");
  elYears.appendChild(all);
  DATA.slice().reverse().forEach(d => {
    const b = document.createElement("button");
    b.className = "chip" + (selected === d.year ? " active" : "");
    b.textContent = d.year + (d.partial ? " · YTD" : "");
    b.onclick = () => select(d.year);
    elYears.appendChild(b);
  });
}

function buildChart() {
  elChart.innerHTML = "";
  elX.innerHTML = "";
  DATA.forEach(d => {
    const col = document.createElement("div");
    col.className = "col" + (selected === d.year ? " active" : "");
    col.onclick = () => select(d.year);
    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (d.miles / maxMiles * 100) + "%";
    const val = document.createElement("span");
    val.className = "val";
    val.textContent = fmt(d.miles);
    bar.appendChild(val);
    col.appendChild(bar);
    elChart.appendChild(col);

    const x = document.createElement("div");
    x.className = "x" + (selected === d.year ? " active" : "");
    x.textContent = "'" + String(d.year).slice(2);
    x.onclick = () => select(d.year);
    elX.appendChild(x);
  });
}

function currentScope() {
  if (selected === "lifetime")
    return { label: "Lifetime", miles: LIFETIME.miles, runs: LIFETIME.runs, partial: false, since: true };
  const d = DATA.find(x => x.year === selected);
  return { label: d.year + (d.partial ? " (year to date)" : ""), miles: d.miles, runs: d.runs, partial: d.partial };
}

function render() {
  buildChips();
  buildChart();
  const s = currentScope();
  document.getElementById("hero-label").textContent = s.label;
  animateNumber(document.getElementById("hero-number"), s.miles);
  let meta = `<b>${fmt(s.runs)}</b> runs`;
  if (s.since) meta += ` since 2018 · <b>${fmt(s.miles / s.runs)}</b> mi average`;
  else meta += ` · <b>${fmt1(s.miles / s.runs)}</b> mi average`;
  if (s.partial) meta += ` · on pace for <b>${fmt(s.miles / YTD_FRACTION)}</b> mi`;
  document.getElementById("hero-meta").innerHTML = meta;

  elHeadline.innerHTML = headlineFor(s.miles);
  elCards.innerHTML = "";
  cardsFor(s.miles).forEach(c => {
    const div = document.createElement("div");
    div.className = "ccard";
    div.innerHTML = `<div class="big">${c.big}</div><div class="desc">${c.desc}</div>`;
    elCards.appendChild(div);
  });
}

function select(s) { selected = s; render(); }

function animateNumber(el, target) {
  const start = parseFloat(el.dataset.cur || "0");
  const t0 = performance.now();
  const dur = 600;
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const v = start + (target - start) * eased;
    el.textContent = fmt(v);
    if (p < 1) requestAnimationFrame(step);
    else { el.textContent = fmt(target); el.dataset.cur = target; }
  }
  requestAnimationFrame(step);
}

render();
</script>
</body>
</html>
